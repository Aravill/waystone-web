<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Sign-up Sheet</title>
    <link rel="stylesheet" href="styles.css">
    <script defer src="/static/vendor/alpinejs.min.js"></script>
</head>
<body x-data="signupPage()" x-init="init()">
    <div class="container">
        <div class="header">
            <h1>Event Sign-up Sheet</h1>
            <div class="user-info">
                <span x-text="displayName"></span>
                <button @click="handleLogout()" class="logout-btn">Logout</button>
            </div>
        </div>

        <div class="events-section">
            <h2>Available Events</h2>
            <div id="eventsList" class="events-list">
                <p>Loading events...</p>
            </div>
        </div>

        <div class="signup-section">
            <h2>Sign Up for an Event</h2>
            <form @submit.prevent="handleSignup()">
                <div class="form-group">
                    <label for="eventSelect">Select Event:</label>
                    <select id="eventSelect" name="event" required>
                        <option value="">-- Select an event --</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="name">Full Name:</label>
                    <input type="text" id="name" name="name" x-model="formData.name" required>
                </div>

                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" x-model="formData.email" required>
                </div>

                <div class="form-group">
                    <label for="phone">Phone (optional):</label>
                    <input type="tel" id="phone" name="phone" x-model="formData.phone">
                </div>

                <button type="submit" class="submit-btn">Sign Up</button>
                <div id="message" class="message" :class="messageType" x-show="messageVisible" x-text="messageText"></div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
