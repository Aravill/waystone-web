<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campaigns</title>
    <link rel="stylesheet" href="styles.css?v=1">
</head>
<body>
    <div class="header">
        <div class="header-left">
            <a href="/" class="logo">Waystone</a>
        </div>
        <div class="header-center">
            <h1>Campaigns</h1>
        </div>
        <div class="header-right">
            <span class="user-name" id="userName"></span>
            <button id="logoutBtn" class="logout-btn">Logout</button>
        </div>
    </div>

    <div class="nav-bar">
        <a href="/" class="nav-item" data-page="dashboard">Dashboard</a>
        <a href="/campaigns" class="nav-item active" data-page="campaigns">Campaigns</a>
        <a href="/profile" class="nav-item" data-page="profile">Profile</a>
    </div>

    <!-- Campaigns Toolbar -->
    <div class="campaigns-toolbar">
        <button type="button" id="registerCampaignBtn" class="toolbar-button">Register campaign</button>
    </div>

    <div class="container">
        <div class="campaigns-section">
            <h2>Available Campaigns</h2>
            <div id="campaignsList" class="campaigns-list">
                <p>Loading campaigns...</p>
            </div>
            <div id="message" class="message"></div>
        </div>
    </div>

    <!-- Campaign Creation Modal -->
    <div id="createCampaignModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Register a new Campaign</h2>
                    <button type="button" class="modal-close" id="closeModalBtn">&times;</button>
            </div>
            <form id="createCampaignForm" class="modal-form">
                <div class="form-group">
                    <label for="campaignTitle">Title *</label>
                    <input type="text" id="campaignTitle" name="title" required>
                </div>
                <div class="form-group">
                    <label for="campaignSummary">Summary *</label>
                    <input type="text" id="campaignSummary" name="summary" required>
                </div>
                <div class="form-group">
                    <label for="campaignDescription">Description *</label>
                    <textarea id="campaignDescription" name="description" rows="4" required></textarea>
                </div>
                <div class="form-group">
                    <label for="campaignPlayerCount">Desired player count *</label>
                    <input type="number" id="campaignPlayerCount" name="desired_player_count" min="1" step="1" required>
                </div>
                <div class="modal-actions">
                    <button type="submit" class="btn-create">Create</button>
                    <button type="button" class="btn-cancel" id="cancelModalBtn">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script src="campaigns.js"></script>
</body>
</html>
