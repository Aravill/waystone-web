<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campaigns</title>
    <link rel="stylesheet" href="styles.css?v=1">
</head>
<body>
    <div class="header">
        <div class="header-left">
            <a href="/" class="logo">Waystone</a>
        </div>
        <div class="header-center">
            <h1>Campaigns</h1>
        </div>
        <div class="header-right">
            <span class="user-name" id="userName"></span>
            <button id="logoutBtn" class="logout-btn">Logout</button>
        </div>
    </div>

    <div class="nav-bar">
        <a href="/" class="nav-item" data-page="dashboard">Dashboard</a>
        <a href="/campaigns" class="nav-item active" data-page="campaigns">Campaigns</a>
    </div>

    <div class="container">
        <div class="campaigns-section">
            <h2>Available Campaigns</h2>
            <div id="campaignsList" class="campaigns-list">
                <p>Loading campaigns...</p>
            </div>
            <div id="message" class="message"></div>
        </div>
    </div>

    <script src="campaigns.js"></script>
</body>
</html>
